<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
        body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: rgba(10, 10, 20, 0.9); padding: 40px; border-radius: 20px; border: 1px solid #00d4ff; text-align: center; animation: moveGlow 2s infinite alternate; }
        @keyframes moveGlow { from { box-shadow: 0 0 10px #00d4ff; } to { box-shadow: 0 0 30px #00d4ff; } }

        /* Dashboard Styles */
        h1 { font-size: 3rem; background: linear-gradient(90deg, #00d4ff, #ff007a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        table { width: 90%; max-width: 800px; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 15px; overflow: hidden; margin-top: 30px; }
        th { padding: 20px; background: rgba(0,0,0,0.3); }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 60px; }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#00d4ff">Login</h2>
            <input type="text" id="user" placeholder="Username"><br>
            <input type="password" id="pass" placeholder="Password"><br>
            <button onclick="login()">Enter</button>
        </div>
    </div>

    <h1>Football Stats</h1>
    <div id="admin-controls" style="display:none; margin-bottom:20px;">
        <input type="text" id="playerName" placeholder="Player Name" style="width: 150px;">
        <button onclick="addPlayer()">Add Player</button>
    </div>

    <table>
        <thead><tr><th>Player</th><th>Goals</th><th>Assists</th><th>G/A</th><th>Actions</th></tr></thead>
        <tbody id="stats-body"></tbody>
    </table>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmi17I8y5rhGWjZQEYc3ru2WOIP1npftM",
            authDomain: "tracker-92e84.firebaseapp.com",
            projectId: "tracker-92e84",
            storageBucket: "tracker-92e84.firebasestorage.app",
            messagingSenderId: "949737700084",
            appId: "1:949737700084:web:232d6f0d372f7eb74bbca1",
            measurementId: "G-PVK04BGE8J"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('players');

        let role = null;
        let players = [];

        // Sync with Firebase
        db.on('value', (snapshot) => {
            players = snapshot.val() || [];
            render();
        });

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin414" && p === "iamadmin") { role = 'admin'; document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-controls').style.display = 'block'; }
            else if(u === "user123" && p === "user120") { role = 'user'; document.getElementById('login-overlay').style.display = 'none'; }
            else { alert("Invalid Credentials!"); }
        }

        function addPlayer() {
            let name = document.getElementById('playerName').value;
            if(name) { players.push({ name, g: 0, a: 0 }); db.set(players); }
        }

        function updateStats(i, type, val) {
            players[i][type] = parseInt(val) || 0;
            db.set(players);
        }

        function render() {
            let html = '';
            players.forEach((p, i) => {
                html += `<tr>
                    <td>${p.name}</td>
                    <td>${role === 'admin' ? `<input type="number" value="${p.g}" onchange="updateStats(${i}, 'g', this.value)">` : p.g}</td>
                    <td>${role === 'admin' ? `<input type="number" value="${p.a}" onchange="updateStats(${i}, 'a', this.value)">` : p.a}</td>
                    <td>${p.g + p.a}</td>
                    <td>${role === 'admin' ? `<button onclick="players.splice(${i},1); db.set(players)">Del</button>` : 'View Only'}</td>
                </tr>`;
            });
            document.getElementById('stats-body').innerHTML = html;
        }
    </script>
</body>
</html>
